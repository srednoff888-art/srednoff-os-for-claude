name: CI

# Runs on every push and PR. Closes the "no automated gate" gap: contributors can't
# silently break the catalog format, a regex, a hook, or bash-3.2 compatibility.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck (bash portability + correctness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck on all .sh files
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # Catches SC2068 (unquoted array expansion - the exact bug class that broke macOS
          # bash 3.2), bashisms, quoting errors, etc. SC1090 is excluded: every script sources
          # a sibling lib via a dynamic $script_dir path, which shellcheck cannot follow by
          # design - that's intentional, not a defect.
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck --severity=warning --shell=bash --exclude=SC1090

  json-validation:
    name: Validate JSON (plugin manifests, evals, settings, version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: jq-parse every JSON file
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            if ! jq empty "$f" 2>/dev/null; then echo "INVALID JSON: $f"; fail=1; fi
          done < <(find . -name '*.json' -not -path './.git/*' -print0)
          exit $fail

  registry-and-evals:
    name: Catalog validation + audit + eval suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Reconstruct the ~/.claude layout the scripts expect
        run: |
          mkdir -p "$HOME/.claude/templates/claude-md-os" "$HOME/.claude/registry"
          # Repo root = template contents; registry/ = registry contents (mirrors the public bundle layout).
          cp -r . "$HOME/.claude/templates/claude-md-os/"
          cp -r registry/. "$HOME/.claude/registry/"
          chmod +x "$HOME/.claude/registry/"*.sh "$HOME/.claude/templates/claude-md-os/scripts/"*.sh "$HOME/.claude/templates/claude-md-os/.claude/hooks/"*.sh
      - name: Catalog format validator (malformed lines would silently vanish)
        run: bash "$HOME/.claude/registry/validate-catalog-format.sh"
      - name: Registry audit (duplicate names, source counts)
        run: bash "$HOME/.claude/registry/audit-registry.sh"
      - name: Eval suite (mode/domain/selector/secret-pattern regression)
        run: bash "$HOME/.claude/templates/claude-md-os/scripts/run-evals.sh"

  hook-canary:
    name: Hooks actually deny known-bad input (fail-closed check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Feed each security hook a known-bad synthetic input and require a block
        run: |
          H="$PWD/.claude/hooks"
          fail=0
          r1=$(echo '{"tool_input":{"command":"mkfs.ext4 /dev/sda1"}}' | bash "$H/block-dangerous-bash.sh")
          echo "$r1" | grep -q deny || { echo "block-dangerous-bash did NOT deny mkfs"; fail=1; }
          r2=$(echo '{"tool_input":{"file_path":"app/.env"}}' | bash "$H/protect-secrets.sh")
          echo "$r2" | grep -q deny || { echo "protect-secrets did NOT deny .env"; fail=1; }
          r3=$(echo '{"prompt":"sk-ant-api03-abcdefghijklmnopqrstuvwx"}' | bash "$H/scan-prompt-secrets.sh")
          echo "$r3" | grep -q '"decision":"block"' || { echo "scan-prompt-secrets did NOT block a pasted key"; fail=1; }
          exit $fail

  profile-lock-gate:
    name: PROFILE.lock enforcement gate (deny -> mark -> allow cycle)
    runs-on: ubuntu-latest
    # Regression test for the real-world case (2026-07-02) where an agent never read
    # PROFILE.lock.md despite it being embedded in the first lines of CLAUDE.md - proving
    # passive context is not enforcement. This verifies the hook pair that makes it one.
    steps:
      - uses: actions/checkout@v5
      - name: Deny -> mark -> allow -> no-gate-when-OS-absent
        run: |
          H="$PWD/.claude/hooks"
          fail=0
          FAKE_PROJ=$(mktemp -d)
          mkdir -p "$FAKE_PROJ/.claude"
          touch "$FAKE_PROJ/.claude/PROFILE.lock.md"
          export HOME=$(mktemp -d)

          r1=$(echo "{\"session_id\":\"ci-sess\",\"cwd\":\"$FAKE_PROJ\",\"tool_input\":{\"file_path\":\"foo.ts\"}}" | bash "$H/require-profile-lock-read.sh")
          echo "$r1" | grep -q deny || { echo "require-profile-lock-read did NOT deny before the lock was read"; fail=1; }

          echo "{\"session_id\":\"ci-sess\",\"tool_input\":{\"file_path\":\"$FAKE_PROJ/.claude/PROFILE.lock.md\"}}" | bash "$H/mark-profile-lock-read.sh"
          [ -f "$HOME/.claude/logs/session-state/ci-sess/profile-lock-read.marker" ] || { echo "mark-profile-lock-read did NOT write the marker"; fail=1; }

          r2=$(echo "{\"session_id\":\"ci-sess\",\"cwd\":\"$FAKE_PROJ\",\"tool_input\":{\"file_path\":\"foo.ts\"}}" | bash "$H/require-profile-lock-read.sh")
          [ -z "$r2" ] || { echo "require-profile-lock-read still denies AFTER the lock was read this session: $r2"; fail=1; }

          NO_OS_PROJ=$(mktemp -d)
          r3=$(echo "{\"session_id\":\"ci-sess-2\",\"cwd\":\"$NO_OS_PROJ\",\"tool_input\":{\"file_path\":\"foo.ts\"}}" | bash "$H/require-profile-lock-read.sh")
          [ -z "$r3" ] || { echo "require-profile-lock-read denied in a project with NO PROFILE.lock.md (should never gate): $r3"; fail=1; }

          exit $fail

  bash-3-2:
    name: Real bash 3.2 runtime (matches macOS /bin/bash 3.2.57)
    runs-on: ubuntu-latest
    # checkout runs on the ubuntu host (it needs Node, which the minimal bash:3.2 Alpine
    # image lacks); the actual tests run INSIDE the official bash:3.2 container via `docker run`
    # against the mounted checkout - so the interpreter really is the ancient bash Apple ships.
    steps:
      - uses: actions/checkout@v5
      - name: Run scripts inside the official bash:3.2 container
        run: |
          docker run --rm -v "$PWD":/work -w /work bash:3.2 sh -euc '
            apk add --no-cache jq grep >/dev/null
            echo "interpreter: $(bash --version | head -1)"
            fail=0
            # 1. Syntax-check every script under bash 3.2.
            for f in $(find . -name "*.sh" -not -path "./.git/*"); do
              bash -n "$f" || { echo "SYNTAX ERROR under bash 3.2: $f"; fail=1; }
            done
            # 2. Security hooks must still deny/block (catches mapfile + set -u empty-array breakage).
            echo "{\"tool_input\":{\"command\":\"mkfs.ext4 /dev/sda1\"}}" | bash .claude/hooks/block-dangerous-bash.sh | grep -q deny || { echo "block-dangerous-bash broke on 3.2"; fail=1; }
            echo "{\"tool_input\":{\"file_path\":\"app/.env\"}}" | bash .claude/hooks/protect-secrets.sh | grep -q deny || { echo "protect-secrets broke on 3.2"; fail=1; }
            echo "{\"prompt\":\"sk-ant-api03-abcdefghijklmnopqrstuvwx\"}" | bash .claude/hooks/scan-prompt-secrets.sh | grep -q "\"decision\":\"block\"" || { echo "scan-prompt-secrets broke on 3.2"; fail=1; }
            # 2b. PROFILE.lock enforcement gate deny/mark/allow cycle.
            FAKE_PROJ=$(mktemp -d); mkdir -p "$FAKE_PROJ/.claude"; touch "$FAKE_PROJ/.claude/PROFILE.lock.md"
            echo "{\"session_id\":\"ci32\",\"cwd\":\"$FAKE_PROJ\",\"tool_input\":{\"file_path\":\"foo.ts\"}}" | bash .claude/hooks/require-profile-lock-read.sh | grep -q deny || { echo "require-profile-lock-read broke on 3.2 (deny)"; fail=1; }
            echo "{\"session_id\":\"ci32\",\"tool_input\":{\"file_path\":\"$FAKE_PROJ/.claude/PROFILE.lock.md\"}}" | bash .claude/hooks/mark-profile-lock-read.sh
            [ -f "$HOME/.claude/logs/session-state/ci32/profile-lock-read.marker" ] || { echo "mark-profile-lock-read broke on 3.2"; fail=1; }
            # 3. Routing scripts on the empty-array path (backend brief = empty questions/connectors: the v1.10 regression).
            mkdir -p "$HOME/.claude/registry"; cp -r registry/. "$HOME/.claude/registry/"; chmod +x "$HOME/.claude/registry/"*.sh
            bash "$HOME/.claude/registry/domain-router.sh" --brief "fix a backend bug" --json | jq -e ".domains" >/dev/null || { echo "domain-router broke on 3.2"; fail=1; }
            bash "$HOME/.claude/registry/select-skills.sh" --brief "add stripe checkout" --json --no-log | jq -e ".picked" >/dev/null || { echo "select-skills broke on 3.2"; fail=1; }
            exit $fail
          '

  windows-powershell:
    name: Windows PowerShell 5.1 (the primary, zero-dependency platform)
    runs-on: windows-latest
    # The .ps1 side is the flagship path (Windows-first, no jq/grep-P needed) but had zero CI
    # coverage until now - the bash side even had a dedicated bash:3.2 job. This runs the real
    # PowerShell hooks, routing, and full eval suite on Windows PowerShell 5.1 (the `powershell`
    # shell on windows-latest is 5.1, not pwsh 7) against the ~/.claude layout the scripts expect.
    steps:
      - uses: actions/checkout@v5
      - name: Reconstruct the ~/.claude layout
        shell: powershell
        run: |
          $reg = "$env:USERPROFILE\.claude\registry"
          $tpl = "$env:USERPROFILE\.claude\templates\claude-md-os"
          New-Item -ItemType Directory -Force -Path $reg, $tpl | Out-Null
          Copy-Item -Recurse -Force ".\*" $tpl
          Copy-Item -Recurse -Force ".\registry\*" $reg
      - name: Catalog validator + registry audit + eval suite (PowerShell)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $reg = "$env:USERPROFILE\.claude\registry"
          $tpl = "$env:USERPROFILE\.claude\templates\claude-md-os"
          & "$reg\validate-catalog-format.ps1"; if ($LASTEXITCODE -ne 0) { throw "catalog validator failed" }
          & "$reg\audit-registry.ps1";          if ($LASTEXITCODE -ne 0) { throw "registry audit failed" }
          & "$tpl\scripts\run-evals.ps1";        if ($LASTEXITCODE -ne 0) { throw "eval suite failed" }
      - name: Hook canary (PowerShell hooks must deny/block known-bad input)
        shell: powershell
        run: |
          $H = ".\.claude\hooks"
          $fail = 0
          $r1 = '{"tool_input":{"command":"mkfs.ext4 /dev/sda1"}}' | & "$H\block-dangerous-bash.ps1"
          if ($r1 -notmatch "deny") { Write-Host "block-dangerous-bash did NOT deny mkfs"; $fail = 1 }
          $r2 = '{"tool_input":{"file_path":"app/.env"}}' | & "$H\protect-secrets.ps1"
          if ($r2 -notmatch "deny") { Write-Host "protect-secrets did NOT deny .env"; $fail = 1 }
          $r3 = '{"prompt":"sk-ant-api03-abcdefghijklmnopqrstuvwx"}' | & "$H\scan-prompt-secrets.ps1"
          if ($r3 -notmatch '"decision":"block"') { Write-Host "scan-prompt-secrets did NOT block a pasted key"; $fail = 1 }
          exit $fail
      - name: PROFILE.lock enforcement gate (deny -> mark -> allow cycle)
        shell: powershell
        run: |
          $H = ".\.claude\hooks"
          $fail = 0
          $fakeProj = Join-Path $env:RUNNER_TEMP "fake-proj"
          New-Item -ItemType Directory -Force -Path "$fakeProj\.claude" | Out-Null
          New-Item -ItemType File -Force -Path "$fakeProj\.claude\PROFILE.lock.md" | Out-Null

          $r1 = "{`"session_id`":`"ci-ps`",`"cwd`":`"$($fakeProj -replace '\\','\\\\')`",`"tool_input`":{`"file_path`":`"foo.ts`"}}" | & "$H\require-profile-lock-read.ps1"
          if ($r1 -notmatch "deny") { Write-Host "require-profile-lock-read did NOT deny before the lock was read"; $fail = 1 }

          "{`"session_id`":`"ci-ps`",`"tool_input`":{`"file_path`":`"$($fakeProj -replace '\\','\\\\')\\.claude\\PROFILE.lock.md`"}}" | & "$H\mark-profile-lock-read.ps1"
          $marker = Join-Path $env:USERPROFILE ".claude\logs\session-state\ci-ps\profile-lock-read.marker"
          if (-not (Test-Path $marker)) { Write-Host "mark-profile-lock-read did NOT write the marker"; $fail = 1 }

          $r2 = "{`"session_id`":`"ci-ps`",`"cwd`":`"$($fakeProj -replace '\\','\\\\')`",`"tool_input`":{`"file_path`":`"foo.ts`"}}" | & "$H\require-profile-lock-read.ps1"
          if ($r2) { Write-Host "require-profile-lock-read still denies AFTER the lock was read this session: $r2"; $fail = 1 }

          exit $fail
